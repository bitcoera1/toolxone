<header class="site-header">

<main class="bmi-page">

    <section class="bmi-card">

<h1>🩺 BMI Calculator Pro</h1>

<p class="tool-subtitle">
Calculate your Body Mass Index quickly and understand your weight category.
</p>

<h2>Check Your BMI</h2>

        <div class="unit-switch">
            <button type="button" class="unit-btn active" id="metricBtn">Metric</button>
            <button type="button" class="unit-btn" id="imperialBtn">Feet / Pounds</button>
        </div>

        <div class="input-group metric-inputs">
            <label for="heightCm">Height (cm)</label>
            <input type="number" id="heightCm" placeholder="Example: 175">
        </div>

        <div class="input-group metric-inputs">
            <label for="weightKg">Weight (kg)</label>
            <input type="number" id="weightKg" placeholder="Example: 70">
        </div>

        <div class="imperial-inputs" style="display:none;">
            <div class="input-group">
                <label for="heightFt">Height (feet)</label>
                <input type="number" id="heightFt" placeholder="Example: 5">
            </div>

            <div class="input-group">
                <label for="heightIn">Height (inches)</label>
                <input type="number" id="heightIn" placeholder="Example: 9">
            </div>

            <div class="input-group">
                <label for="weightLb">Weight (pounds)</label>
                <input type="number" id="weightLb" placeholder="Example: 154">
            </div>
        </div>

        <button class="calculate-btn" id="calculateBMI">
            Calculate BMI
        </button>

        <button class="reset-btn" id="resetBMI">
            Reset
        </button>

    </section>

    <section class="bmi-result-card" id="bmiResultCard">

        <h2>Your BMI Result</h2>

        <div class="bmi-number" id="bmiNumber">--</div>

        <div class="bmi-category" id="bmiCategory">
            Enter your height and weight
        </div>

        <div class="bmi-scale">
            <div class="scale-bar"></div>
            <div class="scale-marker" id="scaleMarker"></div>
        </div>

        <p class="bmi-advice" id="bmiAdvice">
            Your health category and advice will appear here.
        </p>

    </section>

<script>
initializeRelatedTools("bmi");

renderFinanceInfo(
    "financeInfo",
    "What is BMI?",
    "BMI, or Body Mass Index, is a simple calculation using your height and weight. It helps estimate whether your weight is within a healthy range."
);

renderFinanceFAQ(
    "financeFAQ",
    [
        {
            question: "What does BMI mean?",
            answer: "BMI stands for Body Mass Index. It is a number calculated from your height and weight."
        },
        {
            question: "What is a normal BMI range?",
            answer: "A normal BMI is usually between 18.5 and 24.9."
        },
        {
            question: "Can I use feet and pounds?",
            answer: "Yes. This BMI calculator supports both metric units and feet/pounds."
        },
        {
            question: "Is BMI a medical diagnosis?",
            answer: "No. BMI is only a general health indicator and should not replace medical advice."
        }
    ]
);

renderFinanceFeedback("financeFeedback", "BMI Calculator");

</script>
