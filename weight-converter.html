<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weight Converter - ToolXone</title>

<link rel="icon" type="image/png" href="images/toolxone-favicon.png">
<link rel="apple-touch-icon" href="images/toolxone-favicon.png">

<link rel="stylesheet" href="css/tools.css">
<link rel="stylesheet" href="css/weight-converter.css">

</head>

<body data-tool="weight">

<header class="site-header">
    <img src="images/toolxone-logo.jpg" alt="ToolXone Logo" class="site-logo">
    <p>Free Online Calculators, Converters & Utility Tools</p>
    <p>Fast • Accurate • Free</p>
</header>

<div id="navbar"></div>

<main class="tool-area">

    <div class="weight-card">
        <h1>⚖️ Weight Converter</h1>

        <input type="number" id="value" placeholder="Enter value">

        <select id="conversion">
            <option value="kgToLb">Kilograms to Pounds</option>
            <option value="lbToKg">Pounds to Kilograms</option>
        </select>

        <button class="convert-btn" onclick="convertWeight()">Convert</button>

        <div class="result" id="result"></div>
    </div>

</main>

<section id="related-tools-section">
    <section id="relatedTools"></section>
</section>

<div id="financeInfo"></div>
<div id="financeFAQ"></div>
<div id="financeFeedback"></div>

<footer id="siteFooter"></footer>

<script src="js/config.js"></script>
<script src="js/navbar.js"></script>
<script src="js/clock.js"></script>
<script src="js/theme.js"></script>
<script src="js/search.js"></script>
<script src="js/tool-cards.js"></script>
<script src="js/tools.js"></script>
<script src="js/finance-components.js"></script>
<script src="js/weight-converter.js"></script>
<script src="js/footer.js"></script>
<script src="js/app.js"></script>

<script>

renderFinanceInfo(
    "financeInfo",
    "Why Use a Weight Converter?",
    "A weight converter quickly converts kilograms to pounds and pounds to kilograms with accurate calculations."
);

renderFinanceFAQ(
    "financeFAQ",
    [
        {
            question: "Which units are supported?",
            answer: "This converter supports kilograms (kg) and pounds (lbs)."
        },
        {
            question: "Is the conversion accurate?",
            answer: "Yes. It uses the standard conversion factor of 1 kilogram = 2.20462 pounds."
        },
        {
            question: "Can I convert pounds back to kilograms?",
            answer: "Yes. Simply choose 'Pounds to Kilograms' from the dropdown."
        }
    ]
);

renderFinanceFeedback("financeFeedback");
</script>

</body>
</html>
