<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mortgage Calculator - ToolXone</title>

<link rel="icon" type="image/png" href="images/toolxone-favicon.png">
<link rel="apple-touch-icon" href="images/toolxone-favicon.png">

<link rel="stylesheet" href="css/tools.css">
<link rel="stylesheet" href="css/mortgage.css">
</head>

<body data-tool="mortgage">

<header class="site-header">
    <img src="images/toolxone-logo.jpg" class="site-logo" alt="ToolXone Logo">
    <p>Free Online Calculators, Converters & Utility Tools</p>
    <p>Fast • Accurate • Free</p>
</header>

<div id="navbar"></div>

<main class="mortgage-page">

<section class="mortgage-card">

<h1 class="calculator-title"></h1>

<p class="tool-subtitle"></p>

<div id="calculatorForm"></div>

<div class="actions">
<button onclick="runMortgageCalculator()">Calculate</button>
    <button class="reset-btn" onclick="resetMortgage()">Reset</button>
</div>

</section>

<section class="result-card">

<h2>Mortgage Summary</h2>

<div id="mortgageResult" class="mortgage-result">
<div id="mortgageMessage" class="calculator-message"></div>
<p>Your mortgage summary will appear here.</p>
</div>

<div id="mortgageBars" class="growth-bars" style="display:none;">

<div class="bar-row">
<span>Principal</span>

<div class="bar-bg">
<div class="bar investment-bar" id="principalBar"></div>
</div>

</div>

<div class="bar-row">
<span>Interest</span>

<div class="bar-bg">
<div class="bar interest-bar" id="interestBar"></div>
</div>

</div>

</div>

</section>

</main>

<section id="related-tools-section">

    <section class="featured-header">

        <div class="featured-badge-title">
            💡 RELATED TOOLS
        </div>

        <h2>You May Also Like</h2>

        <p>
            Continue exploring related financial calculators.
        </p>

    </section>

    <div id="relatedTools"></div>

</section>

<div id="financeInfo"></div>
<div id="financeFAQ"></div>
<div id="financeFeedback"></div>

<footer id="siteFooter"></footer>

<script src="js/config.js"></script>
<script src="js/navbar.js"></script>
<script src="js/clock.js"></script>
<script src="js/theme.js"></script>
<script src="js/search.js"></script>
<script src="js/tool-cards.js"></script>
<script src="js/tools.js"></script>
<script src="js/form-engine.js"></script>
<script src="js/calculator-engine.js"></script>
<script src="js/finance-components.js"></script>
<script src="js/finance-engine.js"></script>
<script src="js/mortgage.js"></script>
<script src="js/footer.js"></script>
<script src="js/app.js"></script>

<script>
const mortgageCalculator = {
    id: "mortgage",
    title: "Mortgage Calculator",
    icon: "🏡",
    category: "Finance",
    theme: "finance",
    description: "Calculate monthly mortgage payments accurately.",
    subtitle: "Calculate your monthly mortgage payment and total loan cost.",

    fields: [
        {
            label: "Loan Amount",
            type: "number",
            id: "loanAmount",
            placeholder: "300000"
        },
        {
            label: "Annual Interest Rate (%)",
            type: "number",
            id: "interestRate",
            placeholder: "5"
        },
        {
            label: "Loan Term (Years)",
            type: "number",
            id: "loanYears",
            placeholder: "30"
        }
    ],

    info: {
        title: "Why Use a Mortgage Calculator?",
        description: "Estimate your monthly mortgage payments, total interest, and total repayment before buying a home. Perfect for comparing loan options and planning your budget."
    },

    faq: [
        {
            question: "What does this mortgage calculator do?",
            answer: "This calculator estimates your monthly mortgage payment, total interest, and total repayment based on loan amount, interest rate, and loan term."
        },
        {
            question: "Is this mortgage calculator free?",
            answer: "Yes, this ToolXone mortgage calculator is completely free to use."
        }
    ]
};

createFinanceCalculator(mortgageCalculator);
</script>

</body>
</html>
