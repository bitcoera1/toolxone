<body data-tool="qr">

<header class="site-header">
    <img src="images/toolxone-logo.jpg" alt="ToolXone Logo" class="site-logo">
    <p>Free Online Calculators, Converters & Utility Tools</p>
    <p>Fast • Accurate • Free</p>
</header>

<div id="navbar"></div>

<main class="qr-page">

    <section class="qr-card">
        <h1>🔳 QR Code Generator</h1>
        <p class="qr-subtitle">
            Create QR codes instantly for websites, text, phone numbers, emails and more.
        </p>

        <label for="qrType">Select QR Type</label>

<select id="qrType" onchange="changeQRType()">
    <option value="text">Text / Website URL</option>
    <option value="email">Email</option>
    <option value="phone">Phone Number</option>
    <option value="sms">SMS Message</option>
    <option value="wifi">WiFi</option>
</select>

<div id="qrInputs">

    <label for="qrText">Enter Text or URL</label>
    <textarea id="qrText" placeholder="Example: https://toolxone.com or any text"></textarea>

</div>

        <div class="qr-actions">
            <button onclick="generateQR()">Generate QR</button>
            <button class="clear-btn" onclick="clearQR()">Clear</button>
        </div>
    </section>

    <section class="qr-preview-card">
        <h2>QR Preview</h2>

        <div class="qr-preview" id="qrPreview">
            <p>QR Code will appear here</p>
        </div>

        <button class="download-btn" id="downloadBtn" onclick="downloadQR()" style="display:none;">
            Download PNG
        </button>
    </section>

</main>
<section id="related-tools-section">
    <section id="relatedTools"></section>
</section>

<div id="financeInfo"></div>
<div id="financeFAQ"></div>
<div id="financeFeedback"></div>

<footer id="siteFooter"></footer>

<script src="js/statistics/statistics-engine.js"></script>
<script src="js/statistics/statistics-events.js"></script> 
<script src="js/statistics/statistics-api.js"></script> 
<script src="js/statistics/statistics-dashboard.js"></script>

<script src="js/qr.js"></script>

<script>

renderFinanceInfo(
    "financeInfo",
    "Why Use a QR Code Generator?",
    "A QR code generator helps you quickly create scannable QR codes for websites, text, emails, phone numbers, SMS messages and WiFi details."
);

renderFinanceFAQ(
    "financeFAQ",
    [
        {
            question: "What can I create QR codes for?",
            answer: "You can create QR codes for text, website links, email addresses, phone numbers, SMS messages and WiFi details."
        },
        {
            question: "Can I download the QR code?",
            answer: "Yes. After generating a QR code, you can download it as a PNG image."
        },
        {
            question: "Is this QR code generator free?",
            answer: "Yes. This ToolXone QR code generator is free to use online."
        }
    ]
);

renderFinanceFeedback("financeFeedback", "QR Code Generator");

</script>
