<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Scientific Calculator - Toolers</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
background:#f4f6f8;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.calculator{
width:100%;
max-width:520px;
background:#2d3748;
padding:20px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.25);
}

.logo{
text-align:center;
color:white;
font-size:24px;
font-weight:bold;
margin-bottom:15px;
}

.display{
background:#1a202c;
border-radius:12px;
padding:15px;
margin-bottom:15px;
color:white;
}

.expression{
min-height:35px;
font-size:20px;
text-align:right;
word-wrap:break-word;
}

.result{
min-height:45px;
font-size:32px;
font-weight:bold;
text-align:right;
}

.buttons{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

button{
height:58px;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
transition:.2s;
}

button:hover{
transform:scale(1.03);
}

.num{
background:#e2e8f0;
}

.operator{
background:#10b981;
color:white;
}

.function{
background:#475569;
color:white;
}

.equal{
background:#2563eb;
color:white;
}

.clear{
background:#dc2626;
color:white;
}

.special{
background:#7c3aed;
color:white;
}

.footer-row{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-top:10px;
}

.back-home{
display:block;
margin-top:15px;
text-align:center;
text-decoration:none;
color:white;
font-weight:bold;
}

.status{
margin-top:10px;
text-align:center;
color:#cbd5e1;
font-size:14px;
}

@media(max-width:600px){

button{
height:52px;
font-size:16px;
}

.result{
font-size:26px;
}

}

</style>
</head>

<body>

<div class="calculator">

<div class="logo">
TOOLERS SCIENTIFIC CALCULATOR
</div>

<div class="display">
<div class="expression" id="expression"></div>
<div class="result" id="result">0</div>
</div>

<div class="buttons">

<button class="function" onclick="appendFunction('sin(')">sin</button>
<button class="function" onclick="appendFunction('cos(')">cos</button>
<button class="function" onclick="appendFunction('tan(')">tan</button>
<button class="function" onclick="appendFunction('log(')">log</button>

<button class="function" onclick="appendFunction('ln(')">ln</button>
<button class="function" onclick="appendValue('Math.sqrt(')">√</button>
<button class="function" onclick="appendValue('Math.PI')">π</button>
<button class="function" onclick="appendValue('Math.E')">e</button>

<button class="function" onclick="appendValue('(')">(</button>
<button class="function" onclick="appendValue(')')">)</button>
<button class="function" onclick="square()">x²</button>
<button class="function" onclick="appendValue('**')">xʸ</button>

<button class="num" onclick="appendValue('7')">7</button>
<button class="num" onclick="appendValue('8')">8</button>
<button class="num" onclick="appendValue('9')">9</button>
<button class="operator" onclick="appendValue('/')">÷</button>

<button class="num" onclick="appendValue('4')">4</button>
<button class="num" onclick="appendValue('5')">5</button>
<button class="num" onclick="appendValue('6')">6</button>
<button class="operator" onclick="appendValue('*')">×</button>

<button class="num" onclick="appendValue('1')">1</button>
<button class="num" onclick="appendValue('2')">2</button>
<button class="num" onclick="appendValue('3')">3</button>
<button class="operator" onclick="appendValue('-')">−</button>

<button class="num" onclick="appendValue('0')">0</button>
<button class="num" onclick="appendValue('.')">.</button>
<button class="num" onclick="appendValue('%')">%</button>
<button class="operator" onclick="appendValue('+')">+</button>

<button class="clear" onclick="clearAll()">C</button>
<button class="clear" onclick="backspace()">⌫</button>
<button class="special" onclick="useAns()">ANS</button>
<button class="equal" onclick="calculate()">=</button>

</div>

<div class="footer-row">

<button class="special" onclick="showGT()">GT</button>
<button class="special" onclick="previousCalc()">◀</button>
<button class="special" onclick="nextCalc()">▶</button>
<button class="special" onclick="replayHistory()">Replay</button>

</div>

<div class="footer-row">

<button class="function" onclick="toggleSound()">🔊 Sound</button>

</div>

<div class="status" id="status">
Sound OFF
</div>

<a class="back-home" href="index.html">
← Back To Home
</a>

</div>

<!-- PART 2 JavaScript goes here -->

</body>
</html>
