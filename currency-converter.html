<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Currency Converter - ToolXone</title>
<link rel="icon" type="image/png" href="images/toolxone-favicon.png">
<link rel="apple-touch-icon" href="images/toolxone-favicon.png">
<link rel="stylesheet" href="css/tools.css">
<link rel="stylesheet" href="css/currency-converter.css">
<link rel="stylesheet" href="css/feedback.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body data-tool="currency">

<div class="page-wrapper">

<header class="site-header">

<img
src="images/toolxone-logo.jpg"
alt="ToolXone Logo"
class="site-logo">

<p>
Free Online Calculators & Conversion Tools
</p>

<p>
Fast • Accurate • Free
</p>

</header>

<div id="navbar"></div>

<div class="tool-page">

<div class="container">

<h1>Live Currency Converter</h1>

<input type="number" id="amount" placeholder="Enter Amount" value="1">

<select id="fromCurrency">
<option value="USD">USD - US Dollar</option>
<option value="EUR">EUR - Euro</option>
<option value="GBP">GBP - British Pound</option>
<option value="CNY">CNY - Chinese Yuan</option>
<option value="JPY">JPY - Japanese Yen</option>
<option value="CAD">CAD - Canadian Dollar</option>
<option value="AUD">AUD - Australian Dollar</option>
<option value="NZD">NZD - New Zealand Dollar</option>
<option value="CHF">CHF - Swiss Franc</option>
<option value="SGD">SGD - Singapore Dollar</option>
<option value="HKD">HKD - Hong Kong Dollar</option>
<option value="KRW">KRW - South Korean Won</option>
<option value="TRY">TRY - Turkish Lira</option>
<option value="AED">AED - UAE Dirham</option>
<option value="SAR">SAR - Saudi Riyal</option>
<option value="INR">INR - Indian Rupee</option>
<option value="PKR">PKR - Pakistani Rupee</option>
</select>

<select id="toCurrency">
<option value="PKR">PKR - Pakistani Rupee</option>
<option value="USD">USD - US Dollar</option>
<option value="EUR">EUR - Euro</option>
<option value="GBP">GBP - British Pound</option>
<option value="CNY">CNY - Chinese Yuan</option>
<option value="JPY">JPY - Japanese Yen</option>
<option value="CAD">CAD - Canadian Dollar</option>
<option value="AUD">AUD - Australian Dollar</option>
<option value="NZD">NZD - New Zealand Dollar</option>
<option value="CHF">CHF - Swiss Franc</option>
<option value="SGD">SGD - Singapore Dollar</option>
<option value="HKD">HKD - Hong Kong Dollar</option>
<option value="KRW">KRW - South Korean Won</option>
<option value="TRY">TRY - Turkish Lira</option>
<option value="AED">AED - UAE Dirham</option>
<option value="SAR">SAR - Saudi Riyal</option>
<option value="INR">INR - Indian Rupee</option>
</select>

<button onclick="convertCurrency()">Convert</button>

<button class="swap-btn" onclick="swapCurrencies()">Swap Currencies</button>

<div class="result" id="result"></div>

<div class="chart-box">
<h3 id="chartTitle">📈 Exchange Rate Trend</h3>
<canvas id="rateChart"></canvas>
</div>

<div id="statusBar" class="status-bar">Ready ✔</div>

<div class="note">
Live exchange rates powered by ExchangeRate API.
</div>

<a class="back" href="index.html">← Back to Home</a>

</div>

</div>
</div>
<section id="related-tools-section">
    <section id="relatedTools"></section>
</section>

<div id="financeInfo"></div>
<div id="financeFAQ"></div>
<div id="financeFeedback"></div>

<footer id="siteFooter"></footer>

<script src="js/config.js"></script>
<script src="js/navbar.js"></script>
<script src="js/clock.js"></script>
<script src="js/theme.js"></script>
<script src="js/search.js"></script>
<script src="js/tool-cards.js"></script>
<script src="js/tools.js"></script>
<script src="js/finance-components.js"></script>
<script src="js/currency-converter.js"></script>
<script src="js/footer.js"></script>
<script src="js/app.js"></script>

<script>

renderFinanceInfo(
    "financeInfo",
    "Why Use a Currency Converter?",
    "A currency converter helps you quickly convert money between different currencies using live exchange rates."
);

renderFinanceFAQ(
    "financeFAQ",
    [
        {
            question: "Does this currency converter use live rates?",
            answer: "Yes. It fetches the latest available exchange rates from an online exchange rate API."
        },
        {
            question: "Can I swap currencies?",
            answer: "Yes. Use the Swap Currencies button to instantly switch the from and to currencies."
        },
        {
            question: "Why do rates change?",
            answer: "Currency exchange rates change because of market demand, inflation, interest rates and global economic conditions."
        }
    ]
);

renderFinanceFeedback("financeFeedback", "Currency Converter");

</script>

</body>
</html>
