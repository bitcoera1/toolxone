<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Discount Calculator - ToolXone</title>
<link rel="icon" type="image/png" href="images/toolxone-favicon.png">
<link rel="apple-touch-icon" href="images/toolxone-favicon.png">
<link rel="stylesheet" href="css/tools.css">
<link rel="stylesheet" href="css/discount.css">
<link rel="stylesheet" href="css/feedback.css">
</head>

<body data-tool="discount">

<header class="site-header">
    <img src="images/toolxone-logo.jpg" class="site-logo" alt="ToolXone Logo">
    <p>Free Online Calculators, Converters & Utility Tools</p>
    <p>Fast • Accurate • Free</p>
</header>

<div id="navbar"></div>

<main class="discount-page">

<section class="discount-card">

<h1 class="calculator-title"></h1>

<p class="tool-subtitle"></p>

<div id="calculatorForm"></div>

<div class="actions">
    <button onclick="calculateDiscount()">Calculate</button>
    <button class="reset-btn" onclick="resetDiscount()">Reset</button>

</div>

</section>

<section class="result-card">

<h2>Discount Summary</h2>

<div id="discountResult" class="discount-result">

<p>Your discount summary will appear here.</p>

</div>

<div id="discountBars" class="growth-bars" style="display:none;">

<div class="bar-row">

<span>You Pay</span>

<div class="bar-bg">
<div class="bar investment-bar" id="payBar"></div>
</div>

</div>

<div class="bar-row">

<span>You Save</span>

<div class="bar-bg">
<div class="bar interest-bar" id="saveBar"></div>
</div>

</div>

</div>

</section>

</main>

<section id="related-tools-section">

    <section class="featured-header">
        <div class="featured-badge-title">💡 RELATED TOOLS</div>
        <h2>You May Also Like</h2>
        <p>Continue exploring related financial calculators.</p>
    </section>

    <div id="relatedTools"></div>

</section>

<div id="financeInfo"></div>
<div id="financeFAQ"></div>
<div id="financeFeedback"></div>

<footer id="siteFooter"></footer>

<script src="js/config.js"></script>
<script src="js/navbar.js"></script>
<script src="js/clock.js"></script>
<script src="js/theme.js"></script>
<script src="js/search.js"></script>
<script src="js/tool-cards.js"></script>
<script src="js/tools.js"></script>
<script src="js/form-engine.js"></script>
<script src="js/calculator-engine.js"></script>
<script src="js/finance-components.js"></script>
<script src="js/finance-engine.js"></script>
<script src="js/discount.js"></script>
<script src="js/footer.js"></script>
<script src="js/app.js"></script>

<script>
const discountCalculator = {
    id: "discount",
    title: "Discount Calculator",
    icon: "🏷️",
    category: "Finance",
    theme: "finance",
    description: "Calculate savings and final price after discount.",
    subtitle: "Calculate your savings instantly and find the final price after discount.",

    fields: [
        { label: "Original Price", type: "number", id: "originalPrice", placeholder: "1000" },
        { label: "Discount (%)", type: "number", id: "discountPercent", placeholder: "20" }
    ],

    info: {
        title: "Why Use a Discount Calculator?",
        description: "A discount calculator helps you instantly determine how much money you save during sales and promotions, making smarter shopping decisions."
    },

    faq: [
        {
            question: "How is discount calculated?",
            answer: "Discount amount is calculated by multiplying the original price by the discount percentage."
        },
        {
            question: "What does final price mean?",
            answer: "Final price is the amount you pay after subtracting the discount from the original price."
        }
    ]
};

createFinanceCalculator(discountCalculator);
renderFinanceFeedback("financeFeedback", "Discount Calculator");

</script>

</body>
</html>
