<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Compound Interest Calculator - ToolXone</title>

<link rel="icon" type="image/png" href="images/toolxone-favicon.png">
<link rel="apple-touch-icon" href="images/toolxone-favicon.png">

<link rel="stylesheet" href="css/tools.css">
<link rel="stylesheet" href="css/compound.css">
</head>

<body data-tool="compound">

<header class="site-header">
    <img src="images/toolxone-logo.jpg" class="site-logo" alt="ToolXone Logo">
    <p>Free Online Calculators, Converters & Utility Tools</p>
    <p>Fast • Accurate • Free</p>
</header>

<div id="navbar"></div>

<main class="compound-page">

<section class="compound-card">

<h1 class="calculator-title"></h1>

<p class="tool-subtitle"></p>

<div id="calculatorForm"></div>

<div class="actions">
    <button onclick="runCompoundCalculator()">Calculate Growth</button>
    <button class="reset-btn" onclick="resetCompound()">Reset</button>
</div>

</section>

<section class="result-card">

<h2>Investment Summary</h2>

<div id="compoundResult" class="compound-result">

<p>Your investment summary will appear here.</p>

</div>

<div id="growthBars"
class="growth-bars"
style="display:none;">

<div class="bar-row">

<span>Investment</span>

<div class="bar-bg">
<div class="bar investment-bar"
id="investmentBar"></div>
</div>

</div>

<div class="bar-row">

<span>Interest Earned</span>

<div class="bar-bg">
<div class="bar interest-bar"
id="interestBar"></div>
</div>

</div>

</div>

</section>

</main>

<section id="related-tools-section">

    <section class="featured-header">
        <div class="featured-badge-title">💡 RELATED TOOLS</div>
        <h2>You May Also Like</h2>
        <p>Continue exploring related financial calculators.</p>
    </section>

    <div id="relatedTools"></div>

</section>

<div id="financeInfo"></div>
<div id="financeFAQ"></div>
<div id="financeFeedback"></div>

<footer id="siteFooter"></footer>

<script src="js/config.js"></script>
<script src="js/navbar.js"></script>
<script src="js/clock.js"></script>
<script src="js/theme.js"></script>
<script src="js/search.js"></script>
<script src="js/tool-cards.js"></script>
<script src="js/tools.js"></script>
<script src="js/form-engine.js"></script>
<script src="js/calculator-engine.js"></script>
<script src="js/finance-components.js"></script>
<script src="js/finance-engine.js"></script>
<script src="js/compound.js"></script>
<script src="js/footer.js"></script>
<script src="js/app.js"></script>

<script>
const compoundCalculator = {
    id: "compound",
    title: "Compound Interest Calculator",
    icon: "📈",
    category: "Finance",
    theme: "finance",
    description: "Estimate future investment growth using compound interest.",
    subtitle: "Watch your investments grow with the power of compound interest.",

    fields: [
        { label: "Initial Investment", type: "number", id: "principal", placeholder: "10000" },
        { label: "Monthly Contribution", type: "number", id: "monthly", placeholder: "500" },
        { label: "Annual Interest Rate (%)", type: "number", id: "rate", placeholder: "8" },
        { label: "Investment Period", type: "number", id: "years", placeholder: "10" },
        {
            label: "Compounding Frequency",
            type: "select",
            id: "frequency",
            options: [
                { value: "1", label: "Yearly" },
                { value: "4", label: "Quarterly" },
                { value: "12", label: "Monthly" },
                { value: "365", label: "Daily" }
            ]
        }
    ],

    info: {
        title: "Why Compound Interest Matters",
        description: "Compound interest helps your money grow faster because you earn interest not only on your original investment but also on previously earned interest."
    },

    faq: [
        {
            question: "What is compound interest?",
            answer: "Compound interest means earning interest on both your original investment and the interest already earned."
        },
        {
            question: "Can I include monthly contributions?",
            answer: "Yes. This calculator allows you to add monthly contributions to estimate long-term investment growth."
        }
    ]
};

createFinanceCalculator(compoundCalculator);
</script>

</body>
</html>
