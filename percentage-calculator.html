<body data-tool="percentage">

<header class="site-header">
    <img src="images/toolxone-logo.jpg" alt="ToolXone Logo" class="site-logo">
    <p>Free Online Calculators, Converters & Utility Tools</p>
    <p>Fast • Accurate • Free</p>
</header>

<div id="navbar"></div>

<main class="tool-area">

    <div class="percentage-card">

        <h1>📊 Percentage Calculator</h1>
        <p class="subtitle">Calculate percentages, percentage values, and increase/decrease instantly.</p>

        <div class="mode-buttons">
            <button class="mode-btn active" onclick="showMode('of', this)">X% of Y</button>
            <button class="mode-btn" onclick="showMode('what', this)">X is what %?</button>
            <button class="mode-btn" onclick="showMode('change', this)">Increase / Decrease</button>
        </div>

        <div class="calc-section active" id="modeOf">
            <div class="input-group">
                <label for="percentValue">Percentage (%)</label>
                <input type="number" id="percentValue" placeholder="Example: 20">
            </div>

            <div class="input-group">
                <label for="totalValue">Of Value</label>
                <input type="number" id="totalValue" placeholder="Example: 500">
            </div>

            <button class="percent-btn" onclick="calculatePercentOf()">
                Calculate
            </button>

            <button class="percent-btn reset-btn" onclick="resetPercentage()">
                Reset
            </button>
        </div>

        <div class="calc-section" id="modeWhat">
            <div class="input-group">
                <label for="partValue">Part Value</label>
                <input type="number" id="partValue" placeholder="Example: 50">
            </div>

            <div class="input-group">
                <label for="wholeValue">Total Value</label>
                <input type="number" id="wholeValue" placeholder="Example: 200">
            </div>

            <button class="percent-btn" onclick="calculateWhatPercent()">Calculate</button>
        </div>

        <div class="calc-section" id="modeChange">
            <div class="input-group">
                <label for="oldValue">Old Value</label>
                <input type="number" id="oldValue" placeholder="Example: 100">
            </div>

            <div class="input-group">
                <label for="newValue">New Value</label>
                <input type="number" id="newValue" placeholder="Example: 150">
            </div>

            <button class="percent-btn" onclick="calculateChange()">Calculate</button>
        </div>

        <div class="percent-result" id="percentResult"></div>

    </div>

</main>

<section id="related-tools-section">
    <section id="relatedTools"></section>
</section>

        }

);
