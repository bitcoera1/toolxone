<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scientific Calculator Pro</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f172a;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

/* Layout */
.wrapper {
  display: flex;
  gap: 15px;
}

/* Calculator */
.calculator {
  width: 340px;
  background: #111827;
  border-radius: 16px;
  padding: 18px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.6);
}

/* Display */
#display {
  width: 100%;
  height: 60px;
  font-size: 22px;
  text-align: right;
  padding: 10px;
  border: none;
  border-radius: 10px;
  margin-bottom: 12px;
  background: #1f2937;
  color: #fff;
}

/* Buttons grid */
.buttons {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}

/* Base button */
button {
  height: 48px;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: 0.15s ease;
}

/* Hover */
button:hover {
  transform: scale(1.03);
  filter: brightness(1.1);
}

/* Number keys */
.num {
  background: #374151;
  color: #e5e7eb;
}

/* Operators */
.op {
  background: #2563eb;
  color: white;
}

/* Scientific */
.func {
  background: #4c1d95;
  color: #e9d5ff;
}

/* Control buttons */
.danger {
  background: #7f1d1d;
  color: #fecaca;
}

/* History */
.history {
  width: 220px;
  background: #111827;
  border-radius: 12px;
  padding: 10px;
  color: white;
  overflow-y: auto;
  max-height: 420px;
}

.history h3 {
  text-align: center;
  margin: 0 0 10px 0;
}

.history-item {
  background: #1f2937;
  padding: 6px;
  margin: 5px 0;
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
}

.history-item:hover {
  background: #374151;
}
</style>
</head>

<body>

<div class="wrapper">

<!-- Calculator -->
<div class="calculator">
  <input type="text" id="display" disabled>

  <div class="buttons">

    <!-- Scientific -->
    <button class="func" onclick="append('sin(')">sin</button>
    <button class="func" onclick="append('cos(')">cos</button>
    <button class="func" onclick="append('tan(')">tan</button>
    <button class="danger" onclick="clearDisplay()">C</button>

    <!-- Numbers -->
    <button class="num" onclick="append('7')">7</button>
    <button class="num" onclick="append('8')">8</button>
    <button class="num" onclick="append('9')">9</button>
    <button class="op" onclick="append('/')">/</button>

    <button class="num" onclick="append('4')">4</button>
    <button class="num" onclick="append('5')">5</button>
    <button class="num" onclick="append('6')">6</button>
    <button class="op" onclick="append('*')">*</button>

    <button class="num" onclick="append('1')">1</button>
    <button class="num" onclick="append('2')">2</button>
    <button class="num" onclick="append('3')">3</button>
    <button class="op" onclick="append('-')">-</button>

    <button class="num" onclick="append('0')">0</button>
    <button class="num" onclick="append('.')">.</button>
    <button class="op" onclick="calculate()">=</button>
    <button class="op" onclick="append('+')">+</button>

    <!-- Advanced -->
    <button class="func" onclick="append('Math.sqrt(')">√</button>
    <button class="func" onclick="append('Math.PI')">π</button>
    <button class="func" onclick="append('Math.E')">e</button>
    <button class="danger" onclick="deleteLast()">DEL</button>

    <button class="func" onclick="toggleSign()">+/-</button>
    <button class="func" onclick="percentage()">%</button>

  </div>
</div>

<!-- History -->
<div class="history">
  <h3>History</h3>
  <div id="historyList"></div>
</div>

</div>

<script>
let display = document.getElementById("display");
let historyList = document.getElementById("historyList");

let history = [];
let historyIndex = -1;

function append(value) {
  display.value += value;
}

function clearDisplay() {
  display.value = "";
}

function deleteLast() {
  display.value = display.value.slice(0, -1);
}

function toggleSign() {
  if (display.value) {
    display.value = display.value.startsWith("-")
      ? display.value.slice(1)
      : "-" + display.value;
  }
}

function percentage() {
  if (display.value) {
    display.value = (parseFloat(display.value) / 100).toString();
  }
}

function toRad(x) {
  return x * Math.PI / 180;
}

function calculate() {
  try {
    let expr = display.value;

    expr = expr
      .replace(/sin\(/g, "Math.sin(toRad(")
      .replace(/cos\(/g, "Math.cos(toRad(")
      .replace(/tan\(/g, "Math.tan(toRad(");

    let result = eval(expr);

    display.value = result;

    history.push(expr + " = " + result);
    historyIndex = history.length;

    renderHistory();

  } catch (e) {
    display.value = "Error";
  }
}

function renderHistory() {
  historyList.innerHTML = "";

  history.forEach((item) => {
    let div = document.createElement("div");
    div.className = "history-item";
    div.textContent = item;

    div.onclick = () => {
      display.value = item.split(" = ")[0];
    };

    historyList.appendChild(div);
  });
}

/* Keyboard navigation */
document.addEventListener("keydown", function(e) {
  if (e.key === "ArrowUp") {
    if (historyIndex > 0) {
      historyIndex--;
      display.value = history[historyIndex].split(" = ")[0];
    }
  }

  if (e.key === "ArrowDown") {
    if (historyIndex < history.length - 1) {
      historyIndex++;
      display.value = history[historyIndex].split(" = ")[0];
    }
  }
});
</script>

</body>
</html>
