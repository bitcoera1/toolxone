<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Age Calculator - Toolers</title>

<link rel="stylesheet" href="css/tools.css">

<style>
.age-card{
    width:100%;
    max-width:560px;
    background:white;
    padding:35px;
    border-radius:22px;
    box-shadow:0 14px 38px rgba(0,0,0,.12);
}

.age-card h1{
    text-align:center;
    color:#10b981;
    margin-bottom:25px;
}

.age-card label{
    display:block;
    font-weight:700;
    margin-bottom:8px;
}

.age-card input{
    width:100%;
    padding:14px 16px;
    font-size:16px;
    border-radius:12px;
    border:1px solid #d1d5db;
    margin-bottom:18px;
}

.age-btn{
    width:100%;
    border:none;
    border-radius:14px;
    padding:14px;
    background:#10b981;
    color:white;
    font-size:17px;
    font-weight:700;
    cursor:pointer;
}

.age-result{
    margin-top:25px;
    padding:20px;
    border-radius:16px;
    background:#f0fdf4;
    color:#064e3b;
    font-weight:700;
    line-height:1.8;
    display:none;
}

body.dark-mode .age-card{
    background:#1f2937;
    color:#e5e7eb;
}

body.dark-mode .age-card input{
    background:#111827;
    color:#e5e7eb;
    border-color:#374151;
}

body.dark-mode .age-result{
    background:#064e3b;
    color:#ecfdf5;
}
</style>
</head>

<body>

<header class="site-header">
    <img src="images/logo.png" alt="Toolers Logo" class="site-logo">
    <p>Free Online Calculators, Converters & Utility Tools</p>
    <p>Fast • Accurate • Free</p>
</header>

<nav class="navbar">
    <a href="index.html">🏠 Home</a>
    <a href="calculator.html">🧮 Calculator</a>
    <a href="scientific-calculator.html">🔬 Scientific</a>
    <a href="currency-converter.html">💱 Currency</a>
    <a href="weight-converter.html">⚖️ Weight</a>
    <a href="bmi-calculator.html">🩺 BMI</a>
    <a href="age-calculator.html">🎂 Age</a>
    <a href="#">📩 Feedback</a>

    <div class="live-clock" id="liveClock">🕘 Loading time...</div>
    <button class="theme-toggle" id="themeToggle">🌙 Dark</button>
</nav>

<main class="tool-area">
    <div class="age-card">
        <h1>🎂 Age Calculator</h1>

        <label for="birthDate">Enter Your Date of Birth</label>
        <input type="date" id="birthDate">

        <button class="age-btn" onclick="calculateAge()">Calculate Age</button>

        <div class="age-result" id="ageResult"></div>
    </div>
</main>

<footer class="footer">
    <p><strong>Toolers</strong> © 2026</p>
    <p>Free Online Calculators & Conversion Tools</p>
    <p>Fast • Accurate • Free</p>
</footer>

<script>
function calculateAge(){
    const input = document.getElementById("birthDate").value;
    const resultBox = document.getElementById("ageResult");

    if(!input){
        resultBox.style.display = "block";
        resultBox.innerHTML = "Please select your date of birth.";
        return;
    }

    const birthDate = new Date(input);
    const today = new Date();

    if(birthDate > today){
        resultBox.style.display = "block";
        resultBox.innerHTML = "Date of birth cannot be in the future.";
        return;
    }

    let years = today.getFullYear() - birthDate.getFullYear();
    let months = today.getMonth() - birthDate.getMonth();
    let days = today.getDate() - birthDate.getDate();

    if(days < 0){
        months--;
        const previousMonth = new Date(today.getFullYear(), today.getMonth(), 0);
        days += previousMonth.getDate();
    }

    if(months < 0){
        years--;
        months += 12;
    }

    let nextBirthday = new Date(today.getFullYear(), birthDate.getMonth(), birthDate.getDate());

    if(nextBirthday < today){
        nextBirthday.setFullYear(today.getFullYear() + 1);
    }

    const diffTime = nextBirthday - today;
    const daysToBirthday = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

    resultBox.style.display = "block";
    resultBox.innerHTML =
        "🎉 Your Age:<br>" +
        years + " Years, " + months + " Months, " + days + " Days<br><br>" +
        "🎂 Days until next birthday: " + daysToBirthday + " days";
}
</script>

<script src="js/tools.js"></script>

</body>
</html>
