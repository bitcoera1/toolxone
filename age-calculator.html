<body data-tool="age">
<header class="site-header">
    <img src="images/toolxone-logo.jpg" alt="ToolXone Logo" class="site-logo">
    <p>Free Online Calculators, Converters & Utility Tools</p>
    <p>Fast • Accurate • Free</p>
</header>

<div id="navbar"></div>

<main class="tool-area">

    <div class="age-card">

        <h1>🎂 Age Calculator</h1>

        <p class="dob-heading">
            Enter Your Date of Birth
        </p>

        <div class="dob-fields">

            <!-- Day -->
            <div class="dob-field">
                <label for="birthDay">Day</label>

                <select
                    id="birthDay"
                    name="birthDay">
                    <option value="">DD</option>
                </select>
            </div>

            <!-- Month -->
            <div class="dob-field">
                <label for="birthMonth">Month</label>

                <select
                    id="birthMonth"
                    name="birthMonth">
                    <option value="">Month</option>
                    <option value="1">January</option>
                    <option value="2">February</option>
                    <option value="3">March</option>
                    <option value="4">April</option>
                    <option value="5">May</option>
                    <option value="6">June</option>
                    <option value="7">July</option>
                    <option value="8">August</option>
                    <option value="9">September</option>
                    <option value="10">October</option>
                    <option value="11">November</option>
                    <option value="12">December</option>
                </select>
            </div>

            <!-- Year -->
            <div class="dob-field">
                <label for="birthYear">Year</label>

                <select
                    id="birthYear"
                    name="birthYear">
                    <option value="">YYYY</option>
                </select>
            </div>

        </div>

        <button
            class="age-btn"
            onclick="calculateAge()">
            Calculate Age
        </button>

        <button
            class="age-reset-btn"
            onclick="resetAge()">
            Reset
        </button>

        <div
            class="age-result"
            id="ageResult"
            aria-live="polite">
        </div>

    </div>

</main>

                <div class="age-result" id="ageResult"></div>
    </div>
</main>

<script>

renderFinanceInfo(
    "financeInfo",
    "Why Use an Age Calculator?",
    "An age calculator helps you calculate your exact age in years, months and days, along with the number of days left until your next birthday."
);

renderFinanceFAQ(
    "financeFAQ",
    [
        {
            question: "What does this age calculator show?",
            answer: "It shows your exact age in years, months and days, plus days remaining until your next birthday."
        },
        {
            question: "Can I calculate age from any date of birth?",
            answer: "Yes. You can select any valid past date of birth."
        },
        {
            question: "Does it allow future dates?",
            answer: "No. Future dates are not accepted as a valid date of birth."
        }
    ]
);

renderFinanceFeedback("financeFeedback", "Age Calculator");

</script>
