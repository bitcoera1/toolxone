<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scientific Calculator</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #1f1c2c, #928dab);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.calculator {
  width: 340px;
  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  padding: 18px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.4);
  border: 1px solid rgba(255,255,255,0.2);
}

#display {
  width: 100%;
  height: 65px;
  font-size: 24px;
  text-align: right;
  padding: 12px;
  border: none;
  border-radius: 12px;
  margin-bottom: 12px;
  background: rgba(255,255,255,0.15);
  color: #fff;
  outline: none;
}

.buttons {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

button {
  height: 52px;
  font-size: 16px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.2s ease;
  background: linear-gradient(145deg, #6a11cb, #2575fc);
  color: white;
  font-weight: bold;
  box-shadow: 0 4px 10px rgba(0,0,0,0.25);
}

button:hover {
  transform: scale(1.05);
  background: linear-gradient(145deg, #ff6a00, #ee0979);
}

button:active {
  transform: scale(0.95);
}
</style>
</head>

<body>

<div class="calculator">
  <input type="text" id="display" disabled>

  <div class="buttons">

    <!-- Scientific -->
    <button onclick="append('sin(')">sin</button>
    <button onclick="append('cos(')">cos</button>
    <button onclick="append('tan(')">tan</button>
    <button onclick="clearDisplay()">C</button>

    <!-- Numbers -->
    <button onclick="append('7')">7</button>
    <button onclick="append('8')">8</button>
    <button onclick="append('9')">9</button>
    <button onclick="append('/')">/</button>

    <button onclick="append('4')">4</button>
    <button onclick="append('5')">5</button>
    <button onclick="append('6')">6</button>
    <button onclick="append('*')">*</button>

    <button onclick="append('1')">1</button>
    <button onclick="append('2')">2</button>
    <button onclick="append('3')">3</button>
    <button onclick="append('-')">-</button>

    <button onclick="append('0')">0</button>
    <button onclick="append('.')">.</button>
    <button onclick="calculate()">=</button>
    <button onclick="append('+')">+</button>

    <!-- Advanced -->
    <button onclick="append('Math.sqrt(')">√</button>
    <button onclick="append('Math.PI')">π</button>
    <button onclick="append('Math.E')">e</button>
    <button onclick="deleteLast()">DEL</button>

  </div>
</div>

<script>
let display = document.getElementById("display");

// Append values
function append(value) {
  display.value += value;
}

// Clear display
function clearDisplay() {
  display.value = "";
}

// Delete last character
function deleteLast() {
  display.value = display.value.slice(0, -1);
}

// Convert degrees to radians
function toRad(x) {
  return x * Math.PI / 180;
}

// Calculate result
function calculate() {
  try {
    let expr = display.value;

    // Convert scientific functions (DEGREE support)
    expr = expr
      .replace(/sin\(/g, "Math.sin(toRad(")
      .replace(/cos\(/g, "Math.cos(toRad(")
      .replace(/tan\(/g, "Math.tan(toRad(");

    display.value = eval(expr);
  } catch (e) {
    display.value = "Error";
  }
}
</script>

</body>
</html>
