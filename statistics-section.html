<section class="statistics-section">

    <div class="statistics-container">

        <div class="statistics-header">

            <span class="statistics-badge">
                📊 Live Platform Statistics
            </span>

            <h2>
                ToolXone Statistics
            </h2>

            <p>
                Real-time usage across ToolXone calculators,
                converters, utilities and generators.
            </p>

        </div>

        <div class="statistics-grid">

            <div class="statistics-card">

                <div class="statistics-icon">
                    ⚡
                </div>

                <div
    class="statistics-number"
    id="totalToolActions"
    aria-live="polite"
>
                    0
                </div>

                <div class="statistics-label">
                    Tool Actions
                </div>

            </div>
<strong
    id="mostUsedTool"
    aria-live="polite"
>
            <div class="statistics-card">

                <div class="statistics-icon">
                    🧮
                </div>

                <div
                    class="statistics-number"
                    id="totalCalculations"
                >
                    0
                </div>

                <div class="statistics-label">
                    Calculations
                </div>

            </div>

            <div class="statistics-card">

                <div class="statistics-icon">
                    🔄
                </div>

                <div
                    class="statistics-number"
                    id="totalConversions"
                >
                    0
                </div>

                <div class="statistics-label">
                    Conversions
                </div>

            </div>

            <div class="statistics-card">

                <div class="statistics-icon">
                    🛠️
                </div>

                <div
                    class="statistics-number"
                    id="totalUtilities"
                >
                    0
                </div>

                <div class="statistics-label">
                    Utilities
                </div>

            </div>

        </div>

        <div class="statistics-highlight">

            <div class="statistics-highlight-icon">
                🏆
            </div>

            <div class="statistics-highlight-content">

                <span>
                    Most Used Tool
                </span>

                <strong id="mostUsedTool">
                    Loading...
                </strong>

            </div>

        </div>

        <div class="statistics-footer">

            <span class="statistics-live-dot"></span>

            Live statistics updated automatically

        </div>

    </div>

</section>
