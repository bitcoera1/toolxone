<body data-tool="scientific">

<header class="site-header">
    <img src="images/toolxone-logo.jpg" alt="ToolXone Logo" class="site-logo">
    <p>Free Online Calculators, Converters & Utility Tools</p>
    <p>Fast • Accurate • Free</p>
</header>

<div id="navbar"></div>

<main class="tool-area">

    <div class="scientific-card">

        <div class="scientific-title">
            🔬 ToolXone Scientific Calculator
        </div>

        <div class="display">
            <div id="expression" class="expression"></div>
            <div id="result" class="result">0</div>
        </div>
        
        <div
    id="scientificNumberWords"
    class="scientific-number-words"
    aria-live="polite"
    hidden>
</div>

        <div class="buttons">

            <button class="sci-btn function" onclick="appendFunction('sin')">sin</button>
            <button class="sci-btn function" onclick="appendFunction('cos')">cos</button>
            <button class="sci-btn function" onclick="appendFunction('tan')">tan</button>
            <button class="sci-btn function" onclick="appendFunction('log')">log</button>

            <button class="sci-btn function" onclick="appendFunction('ln')">ln</button>
            <button class="sci-btn function" onclick="appendValue('√(')">√</button>
            <button class="sci-btn function" onclick="appendValue('π')">π</button>
            <button class="sci-btn function" onclick="appendValue('e')">e</button>

            <button class="sci-btn function" onclick="appendValue('(')">(</button>
            <button class="sci-btn function" onclick="appendValue(')')">)</button>
            <button class="sci-btn function" onclick="appendValue('^2')">x²</button>
            <button class="sci-btn function" onclick="appendValue('^')">xʸ</button>

            <button class="sci-btn num" onclick="appendValue('7')">7</button>
            <button class="sci-btn num" onclick="appendValue('8')">8</button>
            <button class="sci-btn num" onclick="appendValue('9')">9</button>
            <button class="sci-btn operator" onclick="appendValue('/')">÷</button>

            <button class="sci-btn num" onclick="appendValue('4')">4</button>
            <button class="sci-btn num" onclick="appendValue('5')">5</button>
            <button class="sci-btn num" onclick="appendValue('6')">6</button>
            <button class="sci-btn operator" onclick="appendValue('*')">×</button>

            <button class="sci-btn num" onclick="appendValue('1')">1</button>
            <button class="sci-btn num" onclick="appendValue('2')">2</button>
            <button class="sci-btn num" onclick="appendValue('3')">3</button>
            <button class="sci-btn operator" onclick="appendValue('-')">−</button>

            <button class="sci-btn num" onclick="appendValue('0')">0</button>
            <button class="sci-btn num" onclick="appendValue('.')">.</button>
            <button class="sci-btn num" onclick="appendValue('%')">%</button>
            <button class="sci-btn operator" onclick="appendValue('+')">+</button>

            <button class="sci-btn clear" onclick="clearAll()">C</button>
            <button class="sci-btn clear" onclick="backspace()">⌫</button>
            <button class="sci-btn special" onclick="useAns()">ANS</button>
            <button class="sci-btn equal" onclick="calculate()">=</button>

        </div>

        <div class="utility">
            <button class="sci-btn function" onclick="toggleSound()">🔊 Sound</button>
            <button class="sci-btn function" onclick="insertPi()">π</button>
            <button class="sci-btn function" onclick="insertE()">e</button>
            <button class="sci-btn function" onclick="clearResult()">CE</button>
        </div>

        <div id="status" class="status">Sound OFF</div>

        <a class="back-home" href="index.html">← Back To Home</a>

    </div>

</main>

<section id="related-tools-section">
    <section id="relatedTools"></section>
</section>

<div id="financeInfo"></div>
<div id="financeFAQ"></div>
<div id="financeFeedback"></div>

<footer id="siteFooter"></footer>

<script src="js/config.js"></script>
<script src="js/navbar.js"></script>
<script src="js/clock.js"></script>
<script src="js/theme.js"></script>
<script src="js/search.js"></script>
<script src="js/tool-cards.js"></script>
<script src="js/tools.js"></script>
<script src="js/finance-components.js"></script>
<script src="js/number-engine.js"></script>
<script src="js/scientific-calculator.js"></script>
<script src="js/footer.js"></script>
<script src="js/app.js"></script>

<script>

renderFinanceInfo(
    "financeInfo",
    "Why Use a Scientific Calculator?",
    "A scientific calculator helps you solve advanced calculations such as trigonometry, logarithms, square roots, powers, percentages, constants and brackets."
);

renderFinanceFAQ(
    "financeFAQ",
    [
        {
            question: "What can I calculate with this scientific calculator?",
            answer: "You can calculate basic arithmetic, trigonometric functions, logarithms, square roots, powers, percentages and constants like π and e."
        },
        {
            question: "Does this calculator support keyboard input?",
            answer: "Yes. You can use number keys, operators, Enter, Backspace and Delete."
        },
        {
            question: "Are sin, cos and tan calculated in degrees?",
            answer: "Yes. This calculator calculates trigonometric functions in degrees."
        },
        {
            question: "What does ANS mean?",
            answer: "ANS lets you reuse your previous calculated result in the next calculation."
        }
    ]
);

renderFinanceFeedback("financeFeedback", "Scientific Calculator");

</script>

</body>
</html>
