<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Savings Goal Calculator - ToolXone</title>

<link rel="icon" type="image/png" href="images/toolxone-favicon.png">
<link rel="apple-touch-icon" href="images/toolxone-favicon.png">

<link rel="stylesheet" href="css/tools.css">
<link rel="stylesheet" href="css/savings.css">
<link rel="stylesheet" href="css/feedback.css">
</head>

<body data-tool="savings-goal">

<header class="site-header">
    <img src="images/toolxone-logo.jpg" class="site-logo" alt="ToolXone Logo">
    <p>Free Online Calculators, Converters & Utility Tools</p>
    <p>Fast • Accurate • Free</p>
</header>

<div id="navbar"></div>

<main class="savings-page">

<section class="savings-card">

<h1 class="calculator-title"></h1>

<p class="tool-subtitle"></p>

<div id="calculatorForm"></div>

<div class="actions">
    <button onclick="runSavingsCalculator()">Calculate</button>
    <button class="reset-btn" onclick="resetSavings()">Reset</button>
</div>

</section>

<section class="result-card">

<h2>Savings Summary</h2>

<div id="savingsResult" class="savings-result">
<p>Your savings summary will appear here.</p>
</div>

<div id="savingsBars" class="growth-bars" style="display:none;">

<div class="bar-row">
<span>Current Savings</span>
<div class="bar-bg">
<div class="bar investment-bar" id="currentBar"></div>
</div>
</div>

<div class="bar-row">
<span>Remaining Goal</span>
<div class="bar-bg">
<div class="bar interest-bar" id="remainingBar"></div>
</div>
</div>

</div>

</section>

</main>

<section id="related-tools-section">

    <section class="featured-header">
        <div class="featured-badge-title">💡 RELATED TOOLS</div>
        <h2>You May Also Like</h2>
        <p>Continue exploring related financial calculators.</p>
    </section>

    <div id="relatedTools"></div>

</section>

<div id="financeInfo"></div>
<div id="financeFAQ"></div>
<div id="financeFeedback"></div>

<footer id="siteFooter"></footer>

<script src="js/config.js"></script>
<script src="js/navbar.js"></script>
<script src="js/clock.js"></script>
<script src="js/theme.js"></script>
<script src="js/search.js"></script>
<script src="js/tool-cards.js"></script>
<script src="js/tools.js"></script>
<script src="js/form-engine.js"></script>
<script src="js/calculator-engine.js"></script>
<script src="js/finance-components.js"></script>
<script src="js/finance-engine.js"></script>
<script src="js/savings.js"></script>
<script src="js/footer.js"></script>
<script src="js/app.js"></script>

<script>
const savingsCalculator = {
    id: "savings-goal",
    title: "Savings Goal Calculator",
    icon: "🎯",
    category: "Finance",
    theme: "finance",
    description: "Calculate how much you need to save every month to reach your financial goal.",
    subtitle: "Calculate how much you need to save monthly to reach your goal.",

    fields: [
        {
            label: "Target Amount",
            type: "number",
            id: "targetAmount",
            placeholder: "100000"
        },
        {
            label: "Current Savings",
            type: "number",
            id: "currentSavings",
            placeholder: "10000"
        },
        {
            label: "Time Period (Months)",
            type: "number",
            id: "months",
            placeholder: "12"
        }
    ],

    info: {
        title: "Why Use a Savings Goal Calculator?",
        description: "A savings goal calculator helps you estimate how much you need to save each month to reach your financial target, whether it's for a home, car, vacation, emergency fund, or education."
    },

    faq: [
        {
            question: "What is a savings goal calculator?",
            answer: "It helps you calculate the monthly amount you need to save to reach a financial goal within a specific time."
        },
        {
            question: "Can I use it for emergency funds?",
            answer: "Yes. It works for emergency funds, travel, education, home purchases, retirement planning and many other savings goals."
        }
    ]
};

createFinanceCalculator(savingsCalculator);
renderFinanceFeedback("financeFeedback", "Savings Goal Calculator");

</script>

</body>
</html>
