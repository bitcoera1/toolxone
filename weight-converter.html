<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weight Converter - Toolers</title>

<link rel="stylesheet" href="css/tools.css">

<style>
.tool-area{
    padding:60px 20px;
}

.weight-card{
    max-width:560px;
    margin:0 auto;
    background:white;
    padding:35px;
    border-radius:18px;
    box-shadow:0 10px 30px rgba(0,0,0,.12);
    text-align:center;
}

.weight-card h1{
    color:#4CAF50;
    margin-bottom:25px;
}

.weight-card input,
.weight-card select{
    width:100%;
    padding:14px;
    margin:10px 0;
    font-size:16px;
    border:1px solid #ccc;
    border-radius:8px;
}

.convert-btn{
    width:100%;
    padding:14px;
    margin-top:12px;
    border:none;
    border-radius:10px;
    background:#4CAF50;
    color:white;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
}

.convert-btn:hover{
    background:#059669;
}

.result{
    margin-top:22px;
    font-size:22px;
    font-weight:bold;
    color:#10B981;
}

body.dark-mode .weight-card{
    background:#1f2937;
    color:#e5e7eb;
}

body.dark-mode .weight-card input,
body.dark-mode .weight-card select{
    background:#111827;
    color:#e5e7eb;
    border:1px solid #374151;
}
</style>
</head>

<body>

<header class="site-header">
    <img src="images/logo.png" alt="Toolers Logo" class="site-logo">
    <p>Free Online Calculators, Converters & Utility Tools</p>
    <p>Fast • Accurate • Free</p>
</header>

<nav class="navbar">
    <a href="index.html">🏠 Home</a>
    <a href="calculator.html">🧮 Calculator</a>
    <a href="scientific-calculator.html">🔬 Scientific</a>
    <a href="currency-converter.html">💱 Currency</a>
    <a href="weight-converter.html">⚖️ Weight</a>
    <a href="bmi-calculator.html">🩺 BMI</a>
    <a href="#">📩 Feedback</a>

    <div class="live-clock" id="liveClock">🕘 Loading time...</div>
    <button class="theme-toggle" id="themeToggle">🌙 Dark</button>
</nav>

<main class="tool-area">

    <div class="weight-card">
        <h1>⚖️ Weight Converter</h1>

        <input type="number" id="value" placeholder="Enter value">

        <select id="conversion">
            <option value="kgToLb">Kilograms to Pounds</option>
            <option value="lbToKg">Pounds to Kilograms</option>
        </select>

        <button class="convert-btn" onclick="convertWeight()">Convert</button>

        <div class="result" id="result"></div>
    </div>

</main>

<footer class="footer">
    <p><strong>Toolers</strong> © 2026</p>
    <p>Free Online Calculators & Conversion Tools</p>
    <p>Fast • Accurate • Free</p>
</footer>

<script>

function convertWeight() {
    const value = parseFloat(document.getElementById("value").value);
    const conversion = document.getElementById("conversion").value;
    const resultBox = document.getElementById("result");

    if (isNaN(value)) {
        resultBox.textContent = "Please enter a value.";
        return;
    }

    if (conversion === "kgToLb") {
        resultBox.textContent = value + " kg = " + (value * 2.20462).toFixed(2) + " lbs";
    } else {
        resultBox.textContent = value + " lbs = " + (value / 2.20462).toFixed(2) + " kg";
    }
}
</script>

<script src="js/tools.js"></script>

</body>
</html>
