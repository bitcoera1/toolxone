<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Basic Calculator - ToolXone</title>

<link rel="icon" type="image/png" href="images/toolxone-favicon.png">
<link rel="apple-touch-icon" href="images/toolxone-favicon.png">

<link rel="stylesheet" href="css/tools.css">
<link rel="stylesheet" href="css/calculator.css">

</head>

<body data-tool="basic">

<header class="site-header">
    <img src="images/toolxone-logo.jpg" alt="ToolXone Logo" class="site-logo">
    <p>Free Online Calculators, Converters & Utility Tools</p>
    <p>Fast • Accurate • Free</p>
</header>

<div id="navbar"></div>

<main class="tool-area">

    <div class="calculator-card">

        <h1>🧮 Basic Calculator</h1>

        <input type="text" id="display" readonly>

        <div class="buttons">

            <button class="calc-btn" onclick="appendValue('7')">7</button>
            <button class="calc-btn" onclick="appendValue('8')">8</button>
            <button class="calc-btn" onclick="appendValue('9')">9</button>
            <button class="calc-btn operator" onclick="appendValue('/')">÷</button>

            <button class="calc-btn" onclick="appendValue('4')">4</button>
            <button class="calc-btn" onclick="appendValue('5')">5</button>
            <button class="calc-btn" onclick="appendValue('6')">6</button>
            <button class="calc-btn operator" onclick="appendValue('*')">×</button>

            <button class="calc-btn" onclick="appendValue('1')">1</button>
            <button class="calc-btn" onclick="appendValue('2')">2</button>
            <button class="calc-btn" onclick="appendValue('3')">3</button>
            <button class="calc-btn operator" onclick="appendValue('-')">−</button>

            <button class="calc-btn" onclick="appendValue('0')">0</button>
            <button class="calc-btn" onclick="appendValue('.')">.</button>
            <button class="calc-btn equal" onclick="calculate()">=</button>
            <button class="calc-btn operator" onclick="appendValue('+')">+</button>

<button class="calc-btn clear clear-wide" onclick="clearDisplay()">C</button>
        </div>

        <a class="back" href="index.html">← Back to Home</a>

    </div>

</main>

<section id="related-tools-section">

    <section class="featured-header">
        <div class="featured-badge-title">💡 RELATED TOOLS</div>
        <h2>You May Also Like</h2>
        <p>Continue exploring related calculators and tools.</p>
    </section>

    <div id="relatedTools"></div>

</section>

<div id="financeInfo"></div>
<div id="financeFAQ"></div>
<div id="financeFeedback"></div>

<footer id="siteFooter"></footer>

<script src="js/config.js"></script>
<script src="js/navbar.js"></script>
<script src="js/clock.js"></script>
<script src="js/theme.js"></script>
<script src="js/search.js"></script>
<script src="js/tool-cards.js"></script>
<script src="js/tools.js"></script>
<script src="js/finance-components.js"></script>
<script src="js/calculator.js"></script>
<script src="js/footer.js"></script>
<script src="js/app.js"></script>

<script>

renderFinanceInfo(
    "financeInfo",
    "Why Use a Basic Calculator?",
    "A basic calculator helps you perform quick arithmetic operations such as addition, subtraction, multiplication and division for everyday calculations."
);

renderFinanceFAQ(
    "financeFAQ",
    [
        {
            question: "What can I calculate with this basic calculator?",
            answer: "You can calculate addition, subtraction, multiplication, division and decimal-based calculations."
        },
        {
            question: "Does this calculator support keyboard input?",
            answer: "Yes. You can use number keys, operators, Enter, Backspace, Delete and Escape."
        }
    ]
);

renderFinanceFeedback("financeFeedback");
</script>

</body>
</html>
