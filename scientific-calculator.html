<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Scientific Calculator - Toolers</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
background:#f4f6f8;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.calculator{
width:100%;
max-width:550px;
background:#2d3748;
padding:20px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.25);
}

.logo{
text-align:center;
color:white;
font-size:24px;
font-weight:bold;
margin-bottom:15px;
}

.display{
background:#1a202c;
border-radius:12px;
padding:15px;
margin-bottom:15px;
color:white;
}

.expression{
min-height:35px;
font-size:20px;
text-align:right;
word-wrap:break-word;
overflow-wrap:break-word;
}

.result{
min-height:45px;
font-size:32px;
font-weight:bold;
text-align:right;
}

.buttons{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

button{
height:58px;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
transition:.2s;
font-weight:bold;
}

button:hover{
transform:scale(1.03);
}

.num{
background:#e2e8f0;
color:#111827;
}

.operator{
background:#10b981;
color:white;
}

.function{
background:#475569;
color:white;
}

.equal{
background:#2563eb;
color:white;
}

.clear{
background:#dc2626;
color:white;
}

.special{
background:#7c3aed;
color:white;
}

.utility{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-top:10px;
}

.status{
margin-top:10px;
text-align:center;
color:#cbd5e1;
font-size:14px;
}

.back-home{
display:block;
margin-top:15px;
text-align:center;
text-decoration:none;
color:white;
font-weight:bold;
}

.back-home:hover{
text-decoration:underline;
}

@media(max-width:600px){

button{
height:52px;
font-size:16px;
}

.result{
font-size:26px;
}

.logo{
font-size:20px;
}

}

</style>
</head>

<body>

<div class="calculator">

<div class="logo">
TOOLERS SCIENTIFIC CALCULATOR
</div>

<div class="display">
<div id="expression" class="expression"></div>
<div id="result" class="result">0</div>
</div>

<div class="buttons">

<button class="function" onclick="appendFunction('sin')">sin</button>
<button class="function" onclick="appendFunction('cos')">cos</button>
<button class="function" onclick="appendFunction('tan')">tan</button>
<button class="function" onclick="appendFunction('log')">log</button>

<button class="function" onclick="appendFunction('ln')">ln</button>
<button class="function" onclick="appendValue('√(')">√</button>
<button class="function" onclick="appendValue('π')">π</button>
<button class="function" onclick="appendValue('e')">e</button>

<button class="function" onclick="appendValue('(')">(</button>
<button class="function" onclick="appendValue(')')">)</button>
<button class="function" onclick="appendValue('^2')">x²</button>
<button class="function" onclick="appendValue('^')">xʸ</button>

<button class="num" onclick="appendValue('7')">7</button>
<button class="num" onclick="appendValue('8')">8</button>
<button class="num" onclick="appendValue('9')">9</button>
<button class="operator" onclick="appendValue('/')">÷</button>

<button class="num" onclick="appendValue('4')">4</button>
<button class="num" onclick="appendValue('5')">5</button>
<button class="num" onclick="appendValue('6')">6</button>
<button class="operator" onclick="appendValue('*')">×</button>

<button class="num" onclick="appendValue('1')">1</button>
<button class="num" onclick="appendValue('2')">2</button>
<button class="num" onclick="appendValue('3')">3</button>
<button class="operator" onclick="appendValue('-')">−</button>

<button class="num" onclick="appendValue('0')">0</button>
<button class="num" onclick="appendValue('.')">.</button>
<button class="num" onclick="appendValue('%')">%</button>
<button class="operator" onclick="appendValue('+')">+</button>

<button class="clear" onclick="clearAll()">C</button>
<button class="clear" onclick="backspace()">⌫</button>
<button class="special" onclick="useAns()">ANS</button>
<button class="equal" onclick="calculate()">=</button>

</div>

<div class="utility">

<button class="function" onclick="toggleSound()">🔊 Sound</button>
<button class="function" onclick="insertPi()">π</button>
<button class="function" onclick="insertE()">e</button>
<button class="function" onclick="clearResult()">CE</button>

</div>

<div id="status" class="status">
Sound OFF
</div>

<a class="back-home" href="index.html">
← Back To Home
</a>

</div>

<!-- PART 2 JAVASCRIPT WILL GO HERE -->
<!-- PART 2 JAVASCRIPT WILL GO HERE -->

<script>

let expression = "";
let ans = 0;
let soundEnabled = false;
let justCalculated = false;

const expressionDisplay = document.getElementById("expression");
const resultDisplay = document.getElementById("result");

function updateDisplay() {
    expressionDisplay.textContent = expression;
}

function playSound() {

    if (!soundEnabled) return;

    try {

        const audioContext =
            new (window.AudioContext || window.webkitAudioContext)();

        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();

        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);

        oscillator.type = "square";
        oscillator.frequency.value = 600;
        gainNode.gain.value = 0.05;

        oscillator.start();
        oscillator.stop(audioContext.currentTime + 0.05);

    } catch (e) {}

}

function appendValue(value) {

    if (justCalculated && "0123456789.".includes(value)) {
        expression = "";
        resultDisplay.textContent = "0";
        justCalculated = false;
    }

    expression += value;

    updateDisplay();

    playSound();
}

function appendFunction(func) {

    if (justCalculated) {
        expression = "";
        resultDisplay.textContent = "0";
        justCalculated = false;
    }

    expression += func + "(";

    updateDisplay();

    playSound();
}

function clearAll() {

    expression = "";
    resultDisplay.textContent = "0";
    justCalculated = false;

    updateDisplay();
}

function clearResult() {

    resultDisplay.textContent = "0";
}

function backspace() {

    expression = expression.slice(0, -1);

    updateDisplay();
}

function useAns() {

    if (justCalculated) {
        expression = "";
        justCalculated = false;
    }

    expression += ans;

    updateDisplay();
}

function insertPi() {
    appendValue("π");
}

function insertE() {
    appendValue("e");
}

function toggleSound() {

    soundEnabled = !soundEnabled;

    document.getElementById("status").textContent =
        soundEnabled ? "Sound ON" : "Sound OFF";
}

function preprocessExpression(expr) {

    expr = expr.replace(/π/g, Math.PI);
    expr = expr.replace(/\be\b/g, Math.E);

    expr = expr.replace(/(\d+(\.\d+)?)\^2/g, "($1**2)");
    expr = expr.replace(/\^/g, "**");

    expr = expr.replace(/√\(/g, "Math.sqrt(");

    expr = expr.replace(/sin\(([^()]*)\)/g,
        (_, x) => `Math.sin((${x})*Math.PI/180)`);

    expr = expr.replace(/cos\(([^()]*)\)/g,
        (_, x) => `Math.cos((${x})*Math.PI/180)`);

    expr = expr.replace(/tan\(([^()]*)\)/g,
        (_, x) => `Math.tan((${x})*Math.PI/180)`);

    expr = expr.replace(/log\(([^()]*)\)/g,
        (_, x) => `Math.log10(${x})`);

    expr = expr.replace(/ln\(([^()]*)\)/g,
        (_, x) => `Math.log(${x})`);

    return expr;
}

function calculate() {

    try {

        let processed = preprocessExpression(expression);

        let result = eval(processed);

        if (!isFinite(result)) {
            throw new Error();
        }

        result = Number(result.toFixed(12));

        ans = result;

        resultDisplay.textContent = result;

        expression = String(result);

        justCalculated = true;

        updateDisplay();

    } catch {

        resultDisplay.textContent = "Error";
    }
}

document.addEventListener("keydown", function(e) {

    const key = e.key;

    if ("0123456789".includes(key)) {
        appendValue(key);
    }

    else if (["+", "-", "*", "/", ".", "%", "(", ")"].includes(key)) {
        appendValue(key);
    }

    else if (key === "Enter") {

        e.preventDefault();

        calculate();
    }

    else if (key === "Backspace") {

        backspace();
    }

    else if (key === "Delete") {

        clearAll();
    }
});

updateDisplay();

</script>
</body>
</html>
</body>
</html>
