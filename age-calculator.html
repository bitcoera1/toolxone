<link rel="stylesheet" href="css/tools.css">
<link rel="stylesheet" href="css/age-calculator.css">

</head>

<body>

<header class="site-header">
    <img src="images/toolxone-logo.jpg" alt="ToolXone Logo" class="site-logo">
    <p>Free Online Calculators, Converters & Utility Tools</p>
    <p>Fast • Accurate • Free</p>
</header>

<nav class="navbar">
    <a href="index.html">🏠 Home</a>

    <div class="live-clock" id="liveClock">🕘 Loading time...</div>
    <button class="theme-toggle" id="themeToggle">🌙 Dark</button>
</nav>

<main class="tool-area">
    <div class="age-card">
        <h1>🎂 Age Calculator</h1>

        <label for="birthDate">Enter Your Date of Birth</label>
        <input type="date" id="birthDate">

        <button class="age-btn" onclick="calculateAge()">Calculate Age</button>
        <button class="age-reset-btn" onclick="resetAge()">Reset</button>

        <div class="age-result" id="ageResult"></div>
    </div>
</main>

<section id="related-tools-section">
    <section id="relatedTools"></section>
</section>

<div id="financeInfo"></div>
<div id="financeFAQ"></div>
<div id="financeFeedback"></div>

<footer class="footer">
    <p><strong>ToolXone</strong> © 2026</p>
    <p>Free Online Calculators & Conversion Tools</p>
    <p>Fast • Accurate • Free</p>
</footer>

<script src="js/config.js"></script>
<script src="js/tool-cards.js"></script>
<script src="js/tools.js"></script>
<script src="js/finance-components.js"></script>

<script src="js/age-calculator.js"></script>

<script>
initializeRelatedTools("age");

renderFinanceInfo(
    "financeInfo",
    "Why Use an Age Calculator?",
    "An age calculator helps you calculate your exact age in years, months and days, along with the number of days left until your next birthday."
);

renderFinanceFAQ(
    "financeFAQ",
    [
        {
            question: "What does this age calculator show?",
            answer: "It shows your exact age in years, months and days, plus days remaining until your next birthday."
        },
        {
            question: "Can I calculate age from any date of birth?",
            answer: "Yes. You can select any valid past date of birth."
        },
        {
            question: "Does it allow future dates?",
            answer: "No. Future dates are not accepted as a valid date of birth."
        }
    ]
);

renderFinanceFeedback("financeFeedback");

</script>

</body>
